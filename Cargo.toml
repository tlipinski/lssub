[package]
name = "subster"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.5.24", features = ["derive"] }
toml = "0.8.20"
anyhow = "1.0.95"
tokio = { version = "1.43.0", features = ["rt", "rt-multi-thread", "macros"] }
log = "0.4.25"
serde = { version = "1.0.217", features = ["derive"] }
secrecy = { version = "0.10.3", features = ["serde"] }
env_logger = "0.11.6"
reqwest = { version = "0.12.12", features = ["json"] }
libsecret = "0.7.0"
gio = "0.20.7"
serde_json = "1.0.138"
hex-literal = "0.4.1"
aes = "0.9.0-pre.2"
lazy_static = "1.5.0"
hex = "0.4.3"
