[package]
name = "subster"
version = "0.1.0"
edition = "2021"

[dependencies]
clap = { version = "4.5.24", features = ["derive"] }
toml = "0.8.20"
anyhow = "1.0.95"
tokio = { version = "1.43.0", features = ["rt", "rt-multi-thread", "macros"] }
log = "0.4.25"
serde = { version = "1.0.217", features = ["derive"] }
secrecy = { version = "0.10.3", features = ["serde"] }
env_logger = "0.11.6"
libsecret = "0.7.0"
gio = "0.20.7"
rpassword = "7.3.1"
ratatui = "0.29.0"

osb = { path = "osb" }
